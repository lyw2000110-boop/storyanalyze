
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事分析专家 | 工艺版 StoryAnalyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --industrial-dark: #18181b;
            --industrial-gray: #3f3f46;
            --industrial-light: #f4f4f5;
            --industrial-accent: #fbbf24; /* 安全黄 */
            --industrial-blue: #2563eb;
        }
        body { 
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #ebedef;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px; /* 工业绘图背景感 */
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .industrial-border {
            border: 2px solid var(--industrial-dark);
        }
        .industrial-shadow {
            box-shadow: 4px 4px 0px 0px var(--industrial-dark);
        }
        .industrial-shadow-sm {
            box-shadow: 2px 2px 0px 0px var(--industrial-dark);
        }
        .industrial-btn-hover:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px 0px var(--industrial-dark);
        }
        .industrial-btn-active:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--industrial-dark);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        #pdf-export-content {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 800px;
            padding: 40px;
            background: white;
        }
    </style>
<script type="importmap">

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "mammoth": "https://esm.sh/mammoth@^1.8.0",
    "html2pdf.js": "https://esm.sh/html2pdf.js@0.10.1"
  }
}
</script>

</head>

</html>
